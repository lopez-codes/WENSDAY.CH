# Prometheus Configuration for wensday.ch MVP
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'wensday-ch-production'
    environment: 'production'

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # Main Application Metrics
  - job_name: 'wensday-app'
    static_configs:
      - targets: ['wensday-app:5000']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s
    honor_labels: true
    params:
      format: ['prometheus']

  # Database Metrics (PostgreSQL)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s

  # Redis Metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 30s

  # Node/System Metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s

  # Nginx Metrics
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
    scrape_interval: 30s

  # AI Provider Health Checks
  - job_name: 'ai-providers'
    static_configs:
      - targets: ['wensday-app:5000']
    metrics_path: '/api/admin/providers/health'
    scrape_interval: 60s
    scrape_timeout: 30s

  # Business Metrics
  - job_name: 'business-metrics'
    static_configs:
      - targets: ['wensday-app:5000']
    metrics_path: '/api/metrics/business'
    scrape_interval: 60s

  # Firebase Functions (if used)
  - job_name: 'firebase-functions'
    static_configs:
      - targets: ['firebase-functions:8080']
    metrics_path: '/metrics'
    scrape_interval: 30s
    honor_labels: true

  # Blackbox Monitoring - External Health Checks
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - https://wensday.ch
        - https://api.wensday.ch/health
        - https://admin.wensday.ch
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # SSL Certificate Monitoring
  - job_name: 'blackbox-ssl'
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
        - wensday.ch:443
        - api.wensday.ch:443
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

# Remote Write Configuration (for long-term storage)
remote_write:
  - url: "https://prometheus-prod-10-prod-us-central-0.grafana.net/api/prom/push"
    basic_auth:
      username: "your_grafana_username"
      password: "your_grafana_api_key"
    write_relabel_configs:
      - source_labels: [__name__]
        regex: 'wensday_.*'
        action: keep

# Storage Configuration
storage:
  tsdb:
    path: /prometheus/data
    retention.time: 30d
    retention.size: 10GB
    wal-compression: true