name: Feature Request
description: Eine neue Funktion vorschlagen
title: "[Feature]: "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Danke für deinen Vorschlag! Für direkte Anfragen: nelson@lopez.codes

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: Welches Problem soll gelöst werden?
      placeholder: "Ich bin frustriert, wenn ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Vorgeschlagene Lösung
      description: Wie sollte die Funktion aussehen/funktionieren?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternativen
      description: Welche Alternativen hast du in Betracht gezogen?

  - type: dropdown
    id: priority
    attributes:
      label: Priorität (aus deiner Sicht)
      options:
        - Nice to have
        - Important
        - Critical
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: Ich habe nach ähnlichen Feature Requests gesucht
          required: true
