name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. TypeScript Typ-Check ────────────────────────────────────────────
  typescript:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: tsc --noEmit
        run: npx tsc --noEmit

  # ── 2. Unit Tests (Vitest) ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run Vitest
        run: npx vitest run --reporter=verbose
      - name: Coverage report
        run: npx vitest run --coverage
        continue-on-error: true
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── 3. Angular Build ───────────────────────────────────────────────────
  angular-build:
    name: Angular Build (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build Angular (production)
        run: |
          cd angular-client
          node ../node_modules/@angular/cli/bin/ng.js build --configuration production
        env:
          NODE_OPTIONS: --max-old-space-size=4096
      - name: Check build output exists
        run: |
          test -d dist/public/browser || (echo "Angular build output fehlt!" && exit 1)
          echo "Angular build OK – $(ls dist/public/browser | wc -l) Dateien"

  # ── 4. Backend Build ───────────────────────────────────────────────────
  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build Express backend
        run: |
          npx esbuild server/index.ts \
            --platform=node \
            --packages=external \
            --bundle \
            --format=esm \
            --outdir=dist
      - name: Check dist/index.js exists
        run: test -f dist/index.js || (echo "Backend build output fehlt!" && exit 1)

  # ── 5. Security Audit ─────────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: npm audit (high+critical only)
        run: npm audit --audit-level=high
        continue-on-error: true

  # ── 6. Docker Build Test ───────────────────────────────────────────────
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [typescript, unit-tests, angular-build, backend-build]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image (kein Push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: wensday-ch:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── GATE: Alle Tests bestanden ─────────────────────────────────────────
  all-tests-passed:
    name: All Tests Passed
    runs-on: ubuntu-latest
    needs: [typescript, unit-tests, angular-build, backend-build, security-audit, docker-build]
    if: always()
    steps:
      - name: Prüfe ob alle Jobs erfolgreich waren
        run: |
          echo "TypeScript:     ${{ needs.typescript.result }}"
          echo "Unit Tests:     ${{ needs.unit-tests.result }}"
          echo "Angular Build:  ${{ needs.angular-build.result }}"
          echo "Backend Build:  ${{ needs.backend-build.result }}"
          echo "Security Audit: ${{ needs.security-audit.result }}"
          echo "Docker Build:   ${{ needs.docker-build.result }}"

          if [[ \
            "${{ needs.typescript.result }}"    == "success" && \
            "${{ needs.unit-tests.result }}"    == "success" && \
            "${{ needs.angular-build.result }}" == "success" && \
            "${{ needs.backend-build.result }}" == "success" && \
            "${{ needs.docker-build.result }}"  == "success" \
          ]]; then
            echo ""
            echo "✅ ALLE TESTS BESTANDEN – bereit für Deploy"
          else
            echo ""
            echo "❌ MINDESTENS EIN TEST FEHLGESCHLAGEN"
            exit 1
          fi

      - name: Summary
        if: success()
        run: |
          echo "## ✅ Alle Tests bestanden" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript Check | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests (Vitest) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Angular Build (Production) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Build | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build Test | ✅ |" >> $GITHUB_STEP_SUMMARY
