name: Deploy Free Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'free-frontend/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload free-frontend as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: free-frontend/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
