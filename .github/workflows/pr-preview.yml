name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

env:
  REGION: europe-west6
  REGISTRY: europe-west6-docker.pkg.dev

jobs:
  # ── Deploy Preview-Umgebung für jeden PR ──────────────────────────────
  deploy-preview:
    name: Preview Deploy (PR #${{ github.event.number }})
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push preview image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/wensday-ch/wensday-ch:pr-${{ github.event.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy preview to Cloud Run
        id: preview
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: wensday-ch-pr-${{ github.event.number }}
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/wensday-ch/wensday-ch:pr-${{ github.event.number }}
          flags: |
            --allow-unauthenticated
            --port=8080
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=2
          secrets: |
            DATABASE_URL=DATABASE_URL:latest
            OPENAI_API_KEY=OPENAI_API_KEY:latest
            GEMINI_API_KEY=GEMINI_API_KEY:latest
            SESSION_SECRET=SESSION_SECRET:latest
          env_vars: NODE_ENV=production

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.preview.outputs.url }}';
            const body = `## 🔍 Preview Deploy bereit\n\n| | |\n|---|---|\n| **URL** | ${url} |\n| **PR** | #${{ github.event.number }} |\n| **Commit** | \`${{ github.sha }}\` |\n\n> Preview wird automatisch gelöscht wenn der PR geschlossen wird.`;
            github.rest.issues.createComment({
              issue_number: ${{ github.event.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # ── Preview aufräumen wenn PR geschlossen ─────────────────────────────
  cleanup-preview:
    name: Cleanup Preview
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Delete preview service
        run: |
          gcloud run services delete wensday-ch-pr-${{ github.event.number }} \
            --region=${{ env.REGION }} \
            --quiet \
            || echo "Service not found, skipping cleanup"
