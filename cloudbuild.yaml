# Google Cloud Build – wensday.ch CI/CD Pipeline
# Trigger: Push auf main branch
# Deployt automatisch auf Cloud Run (europe-west6 = Zürich)
#
# Setup:
#   1. GCP Projekt: gcloud projects create wensday-ch
#   2. Cloud Run API: gcloud services enable run.googleapis.com
#   3. Artifact Registry: gcloud services enable artifactregistry.googleapis.com
#   4. Secret Manager: gcloud services enable secretmanager.googleapis.com
#   5. Trigger verbinden: Cloud Build > Triggers > GitHub verbinden

substitutions:
  _REGION: europe-west6
  _SERVICE: wensday-ch
  _REPO: wensday
  _IMAGE: gcr.io/$PROJECT_ID/wensday-ch

steps:
  # 1. Docker Image bauen
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_IMAGE:$COMMIT_SHA'
      - '-t'
      - '$_IMAGE:latest'
      - '.'
    id: 'build-image'

  # 2. Image in Registry pushen
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '$_IMAGE'
    id: 'push-image'
    waitFor: ['build-image']

  # 3. Auf Cloud Run deployen (Zürich)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE'
      - '--image=$_IMAGE:$COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-secrets=DATABASE_URL=DATABASE_URL:latest'
      - '--set-secrets=OPENAI_API_KEY=OPENAI_API_KEY:latest'
      - '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest'
      - '--set-secrets=STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest'
      - '--set-secrets=STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest'
      - '--set-secrets=SESSION_SECRET=SESSION_SECRET:latest'
      - '--set-env-vars=NODE_ENV=production'
      - '--set-env-vars=ALLOWED_ORIGINS=https://lopez-codes.github.io'
    id: 'deploy-cloudrun'
    waitFor: ['push-image']

images:
  - '$_IMAGE:$COMMIT_SHA'
  - '$_IMAGE:latest'

timeout: '1200s'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
